<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="profile-header ion-text-center ion-padding">
    <ion-avatar class="centered">
      <img src="https://ionicframework.com/docs/img/demos/avatar.svg" alt="Profile Photo" />
    </ion-avatar>
    <h2>{{ user?.name }}</h2>
    <p>{{ user?.email }}</p>
  </div>

  <ion-list lines="full">
    <ion-list-header>
      <ion-label>Account Details</ion-label>
    </ion-list-header>

    <ion-item>
      <ion-icon name="person-outline" slot="start"></ion-icon>
      <ion-label>
        <p>Name</p>
        <h2>{{ user?.name }}</h2>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="mail-outline" slot="start"></ion-icon>
      <ion-label>
        <p>Email</p>
        <h2>{{ user?.email }}</h2>
      </ion-label>
    </ion-item>

    <ion-item button>
      <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
      <ion-label>Change Password (Phase 2)</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
